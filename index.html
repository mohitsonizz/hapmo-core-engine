<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hapmo | AI Shopping Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* A simple spinning animation for the loading state */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4f46e5; /* Indigo-600 */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <nav class="bg-indigo-600 p-4 shadow-md">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-white tracking-wide">Hapmo</h1>
            <a href="#" class="text-indigo-100 hover:text-white transition">About</a>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto mt-12 px-4 text-center">
        <h2 class="text-4xl font-extrabold text-gray-900 mb-4">Find the Lowest Price, Instantly.</h2>
        <p class="text-gray-500 mb-8">Compare real-time prices across Amazon and Flipkart in seconds.</p>

        <div class="flex flex-col md:flex-row items-center bg-white rounded-full shadow-lg p-2 border border-gray-200">
            <input type="text" id="searchInput" placeholder="Search any product (e.g., iPhone 15)..." 
                class="w-full md:w-3/4 px-6 py-3 text-lg outline-none rounded-t-full md:rounded-l-full md:rounded-tr-none bg-transparent">
            
            <button onclick="searchProduct()" class="w-full md:w-1/4 mt-2 md:mt-0 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-full transition duration-300">
                Search
            </button>
        </div>
    </main>

    <div id="loadingSection" class="hidden text-center mt-12">
        <div class="loader mb-4"></div>
        <p class="text-gray-600 font-medium">Hapmo AI is scanning the web... Please wait 10-15 seconds.</p>
    </div>

    <div id="resultsSection" class="max-w-4xl mx-auto mt-12 px-4 hidden pb-12">
        <div class="bg-indigo-50 border border-indigo-100 rounded-lg p-4 mb-6 text-center">
            <h3 class="text-lg font-semibold text-indigo-800" id="winnerBanner">Recommendation goes here</h3>
        </div>

        <div id="cardsContainer" class="flex flex-col gap-4">
            </div>
    </div>

    <script>
        async function searchProduct() {
            const query = document.getElementById('searchInput').value;
            if (!query) return alert("Please enter a product name!");

            // 1. Show loader, hide old results
            document.getElementById('loadingSection').classList.remove('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('cardsContainer').innerHTML = '';

            try {
                // 2. Call the Python Backend API
                const response = await fetch(`http://127.0.0.1:8000/search?q=${encodeURIComponent(query)}`);
                const result = await response.json();

                // 3. Hide loader, show results
                document.getElementById('loadingSection').classList.add('hidden');
                document.getElementById('resultsSection').classList.remove('hidden');

                // 4. Set the winner banner
                const banner = document.getElementById('winnerBanner');
                if (result.winner !== "None") {
                    banner.innerHTML = `💡 Hapmo Recommendation: Buy from <span class="font-bold text-indigo-900">${result.winner}</span> to save money!`;
                } else {
                    banner.innerHTML = "❌ Could not find reliable prices for this product.";
                }

                // 5. Create and inject the product cards
                result.data.forEach(item => {
                    // Decide logo color based on store
                    const storeColor = item.store === 'Amazon' ? 'text-yellow-600' : 'text-blue-600';
                    
                    const cardHTML = `
                        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col md:flex-row items-center justify-between hover:shadow-md transition duration-200">
                            <div class="flex-1 mb-4 md:mb-0">
                                <span class="font-bold text-sm uppercase tracking-wider ${storeColor}">${item.store}</span>
                                <h4 class="text-lg font-semibold text-gray-800 mt-1">${item.title.substring(0, 60)}...</h4>
                            </div>
                            
                            <div class="flex flex-col items-end min-w-[150px]">
                                <span class="text-2xl font-extrabold text-gray-900">${item.price}</span>
                                <a href="${item.link}" target="_blank" class="mt-2 w-full text-center bg-green-500 hover:bg-green-600 text-white font-medium py-2 px-4 rounded-lg transition duration-200">
                                    Go to Store
                                </a>
                            </div>
                        </div>
                    `;
                    document.getElementById('cardsContainer').innerHTML += cardHTML;
                });

            } catch (error) {
                console.error("API Error:", error);
                alert("Make sure your Python API server is running in the terminal!");
                document.getElementById('loadingSection').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
